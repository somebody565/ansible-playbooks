- name: Update packages
  ansible.builtin.apt:
    upgrade: true
    update_cache: true

- name: Add fastfetch repository
  ansible.builtin.apt_repository:
    repo: 'ppa:zhangsongcui3371/fastfetch'
  when:
    - ansible_distribution == "Ubuntu"
    - ansible_distribution_version is version('26.04', '<')

- name: Install packages
  ansible.builtin.apt:
    name:
      - eza
      - curl
      - gcp
      - fastfetch
      - stow
      - zsh
      - git
      - htop
      - btop
      - iftop
      - zoxide
    update_cache: true
